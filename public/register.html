<!DOCTYPE html>
<html>
<head>
  <title>Đăng ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:400px">

  <div class="card shadow p-4">
    <h3 class="text-center mb-3">Đăng ký</h3>

    <input id="username" class="form-control mb-3" placeholder="Username">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-success w-100 mb-2" onclick="register()">Đăng ký</button>

    <div class="text-center">
      <a href="login.html">Đã có tài khoản?</a>
    </div>
  </div>

</div>

<script>
function register() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  fetch('/api/auth/register', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.token) {
      // auto login
      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role);

      alert('Đăng ký thành công');

      window.location.href = 'index.html';
    } else {
      alert('Đăng ký thất bại');
    }
  })
  .catch(() => alert('Lỗi server'));
}
</script>

</body>
</html>

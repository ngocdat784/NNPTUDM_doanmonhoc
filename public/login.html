<!DOCTYPE html>
<html>
<head>
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:400px">

  <div class="card shadow p-4">
    <h3 class="text-center mb-3">Đăng nhập</h3>

    <input id="username" class="form-control mb-3" placeholder="Username">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100 mb-2" onclick="login()">Đăng nhập</button>

    <div class="text-center">
      <a href="register.html">Chưa có tài khoản?</a>
    </div>
  </div>

</div>

<script>
function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  fetch('/api/auth/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ username, password })
  })
  .then(res => {
    if (!res.ok) {
      // nếu server trả lỗi (400, 401...)
      return res.text().then(msg => { throw new Error(msg) });
    }
    return res.json();
  })
  .then(data => {
    // lưu token
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);

    alert('Đăng nhập thành công');

    window.location.href = 'index.html';
  })
  .catch(err => {
    alert(err.message || 'Sai tài khoản hoặc mật khẩu');
  });
}
</script>

</body>
</html>

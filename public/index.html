<!DOCTYPE html>
<html>
<head>
  <title>PC Shop Admin</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <!-- AUTH BAR -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <!-- LEFT -->
    <div id="user-info" class="fw-bold"></div>

    <!-- RIGHT -->
    <div class="d-flex gap-2 align-items-center">

      <!-- 🛒 CART ICON -->
      <div id="cart-icon" style="position: relative; cursor: pointer; display:none;" onclick="goToCart()">
        <i class="bi bi-cart" style="font-size: 24px;"></i>

        <span id="cart-count"
              style="
                position:absolute;
                top:-8px;
                right:-10px;
                background:red;
                color:white;
                border-radius:50%;
                padding:2px 6px;
                font-size:12px;
              ">
          0
        </span>
      </div>

      <!-- 🧾 ORDER BUTTON -->
      <div id="order-btn" style="display:none;">
        <a id="order-link" href="orders.html" class="btn btn-info">
          Đơn hàng
        </a>
      </div>

      <!-- AUTH -->
      <div id="auth-buttons">
        <a href="login.html" class="btn btn-primary">Đăng nhập</a>
        <a href="register.html" class="btn btn-success">Đăng ký</a>
      </div>

      <button id="logout-btn" class="btn btn-danger" onclick="logout()">
        Đăng xuất
      </button>

    </div>
  </div>

  <h1 class="text-center mb-4">PC Shop</h1>

  <!-- 🔍 SEARCH -->
  <div class="mb-4 position-relative">

    <input 
      id="search-input"
      type="text" 
      class="form-control"
      placeholder="Tìm sản phẩm hoặc danh mục..."
      oninput="handleSearch()"
    >

    <!-- GỢI Ý -->
    <div id="search-suggest"
         class="list-group position-absolute w-100 shadow"
         style="z-index:999; display:none;">
    </div>

  </div>

  <!-- ================= ADMIN VIEW ================= -->
  <div id="admin-view">

    <!-- CATEGORY -->
    <div class="text-end mb-3">
      <a id="category-btn" href="category.html" class="btn btn-dark btn-lg">
        Quản lý danh mục
      </a>
    </div>

    <!-- FORM -->
    <div class="card shadow p-4 mb-4">
      <h4 class="mb-3">Thêm sản phẩm</h4>

      <div class="row g-2">
        <div class="col-md-4">
          <input id="name" class="form-control" placeholder="Tên sản phẩm">
        </div>

        <div class="col-md-2">
          <input id="price" class="form-control" placeholder="Giá">
        </div>

        <div class="col-md-3">
          <select id="category" class="form-select"></select>
        </div>

        <div class="col-md-2">
          <input type="file" id="image" class="form-control">
        </div>

        <div class="col-md-1">
          <button id="add-btn" class="btn btn-primary w-100" onclick="addProduct()">+</button>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow">
      <div class="card-body">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-dark text-center">
            <tr>
              <th>ID</th>
              <th>Ảnh</th>
              <th>Tên</th>
              <th>Giá</th>
              <th>Danh mục</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="product-table"></tbody>
        </table>

        <div id="admin-pagination" class="mt-3 text-center"></div>

      </div>
    </div>

  </div>

  <!-- ================= USER VIEW ================= -->
<div id="user-view" style="display:none">

  <!-- 🔥 SẢN PHẨM BÁN CHẠY -->
  <div class="mb-4">
    <h4>🔥 Sản phẩm bán chạy</h4>
    <div id="top-products" class="row"></div>
  </div>

  <!-- 🎯 GỢI Ý CHO BẠN -->
  <div class="mb-4">
    <h4>🎯 Gợi ý cho bạn</h4>
    <div id="suggest-products" class="row"></div>
  </div>

  <!-- DANH SÁCH -->
  <div id="user-product-container"></div>

  <!-- PHÂN TRANG -->
  <div id="user-pagination" class="mt-3 text-center"></div>

</div>

</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<script>
function goToCart() {
  window.location.href = 'cart.html';
}
</script>

</body>
<script>

let categories = [];
let allProducts = [];
let currentPage = 1;

const ADMIN_PAGE_SIZE = 5;
const USER_PAGE_SIZE = 5;
const rawToken = localStorage.getItem('token');
const role = localStorage.getItem('role');
const token = rawToken ? `Bearer ${rawToken}` : null;

// ================= AUTH UI =================
function initAuthUI() {
  const userInfo = document.getElementById('user-info');
  const authButtons = document.getElementById('auth-buttons');
  const logoutBtn = document.getElementById('logout-btn');
  const cartIcon = document.getElementById('cart-icon');

  // 🧾 NEW
  const orderBtn = document.getElementById('order-btn');
  const orderLink = document.getElementById('order-link');

  const adminView = document.getElementById('admin-view');
  const userView = document.getElementById('user-view');

  // ===== CHƯA LOGIN =====
  if (!rawToken) {
    userInfo.innerText = "Khách";

    authButtons.style.display = 'block';
    logoutBtn.style.display = 'none';

    adminView.style.display = 'none';
    userView.style.display = 'block';

    // 🔥 thêm
    if (cartIcon) cartIcon.style.display = 'none';
    if (orderBtn) orderBtn.style.display = 'none';

    return;
  }

  try {
    const payload = JSON.parse(atob(rawToken.split('.')[1]));
    userInfo.innerText = `${payload.username} | ${role}`;

    authButtons.style.display = 'none';
    logoutBtn.style.display = 'inline-block';

  } catch (e) {
    localStorage.clear();
    location.reload();
  }

  // ===== ADMIN =====
  if (role === 'ADMIN') {
    adminView.style.display = 'block';
    userView.style.display = 'none';

    if (cartIcon) cartIcon.style.display = 'none';

    // 🧾 ADMIN ORDER
    if (orderBtn) orderBtn.style.display = 'block';
    if (orderLink) orderLink.innerText = 'Quản lý đơn hàng';
  } 

  // ===== USER =====
  else {
    adminView.style.display = 'none';
    userView.style.display = 'block';

    if (cartIcon) cartIcon.style.display = 'block';

    // 🧾 USER ORDER
    if (orderBtn) orderBtn.style.display = 'block';
    if (orderLink) orderLink.innerText = 'Lịch sử đơn hàng';
  }
}

// ================= ERROR =================
function handleAuthError(res) {
  if (res.status === 401 || res.status === 403) {
    alert("Hết phiên hoặc không có quyền");
    logout();
    return true;
  }
  return false;
}

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// ================= CATEGORY =================
function loadCategories() {
  fetch('/api/categories', {
    headers: token ? { Authorization: token } : {}
  })
    .then(res => res.json())
    .then(data => {
      categories = data;

      // ADMIN select
      const select = document.getElementById('category');
      if (select) {
        select.innerHTML = '';
        data.forEach(c => {
          const option = document.createElement('option');
          option.value = c.id;
          option.innerText = c.name;
          select.appendChild(option);
        });
      }
    });
}
async function loadTopProducts() {
  const res = await fetch('/api/products/top');
  const data = await res.json();

  renderTopProducts(data);
}

async function loadRecommendations() {
  const res = await apiFetch('/api/products/recommend');
  if (!res) return;

  const data = await res.json();
  renderRecommendations(data);
}
// ================= PRODUCT =================
function loadProducts() {
  fetch('/api/products', {
    headers: token ? { Authorization: token } : {}
  })
    .then(res => res.json())
    .then(data => {

      // 🔥 LƯU DATA CHO SEARCH + PAGINATION
      allProducts = data;

      // 🔥 RESET PAGE khi load mới
      currentPage = 1;

      // ===== RENDER THEO ROLE =====
      if (role === 'ADMIN') {
        renderAdminProducts(allProducts);
      } else {
        renderUserProducts(allProducts);
      }
    });
}
function renderTopProducts(products) {
  const container = document.getElementById('top-products');
  container.innerHTML = '';

  products.forEach(p => {
    const col = document.createElement('div');
    col.className = 'col-md-3 mb-3';

    col.innerHTML = `
      <div class="card border-danger shadow-sm">
        <div class="badge bg-danger position-absolute">HOT</div>

        <img src="/uploads/${p.image || 'no-image.png'}"
             class="card-img-top"
             style="height:150px;object-fit:cover">

        <div class="card-body">
          <h6>${p.name}</h6>
          <p class="text-danger">${p.price} VND</p>
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}
function renderUserProducts(products) {
  const container = document.getElementById('user-product-container');
  container.innerHTML = '';

  // ===== GROUP THEO CATEGORY =====
  const categoryMap = {};

  products.forEach(p => {
    if (!categoryMap[p.category_id]) {
      categoryMap[p.category_id] = {
        name: p.category_name,
        products: []
      };
    }
    categoryMap[p.category_id].products.push(p);
  });

  const categoryList = Object.values(categoryMap);

  // ===== PHÂN TRANG CATEGORY =====
  const start = (currentPage - 1) * USER_PAGE_SIZE;
  const paginatedCats = categoryList.slice(start, start + USER_PAGE_SIZE);

  paginatedCats.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'mb-4';

    catDiv.innerHTML = `<h4 class="mb-3">${cat.name}</h4>`;

    const row = document.createElement('div');
    row.className = 'row';

    cat.products.forEach(p => {
      const col = document.createElement('div');
      col.className = 'col-md-3 mb-3';

      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="/uploads/${p.image || 'no-image.png'}" 
               class="card-img-top" 
               style="height:150px;object-fit:cover">

          <div class="card-body">
            <h6>${p.name}</h6>
            <p class="text-danger fw-bold">${p.price} VND</p>

            <button class="btn btn-success w-100" onclick="addToCart(${p.id})">
              Thêm vào giỏ
            </button>
          </div>
        </div>
      `;

      row.appendChild(col);
    });

    catDiv.appendChild(row);
    container.appendChild(catDiv);
  });

  // ===== PAGINATION =====
  renderPagination(categoryList.length, USER_PAGE_SIZE, 'user');
}

function renderAdminProducts(products) {
  const table = document.getElementById('product-table');
  table.innerHTML = '';

  // ===== FIX: tránh lỗi page vượt quá =====
  const totalPages = Math.ceil(products.length / ADMIN_PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages || 1;

  // ===== PAGINATION =====
  const start = (currentPage - 1) * ADMIN_PAGE_SIZE;
  const paginated = products.slice(start, start + ADMIN_PAGE_SIZE);

  // ===== RENDER (GIỮ NGUYÊN 100% UI CŨ) =====
  paginated.forEach(p => {
    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${p.id}</td>

      <td>
        <img src="/uploads/${p.image || 'no-image.png'}"
             width="60" height="60"
             style="object-fit:cover; cursor:pointer"
             onclick="selectImage(${p.id})">

        <input type="file" id="img-${p.id}" hidden onchange="uploadImage(${p.id})">
      </td>

      <td><input value="${p.name}" class="form-control" id="name-${p.id}" disabled></td>
      <td><input value="${p.price}" class="form-control" id="price-${p.id}" disabled></td>

      <td>
        <select class="form-select" id="cat-${p.id}" disabled>
          ${categories.map(c =>
            `<option value="${c.id}" ${c.id == p.category_id ? 'selected' : ''}>${c.name}</option>`
          ).join('')}
        </select>
      </td>

      <td class="text-center">
        <button class="btn btn-sm btn-warning mb-1" id="btn-${p.id}" onclick="toggleEdit(${p.id})">Sửa</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Xóa</button>
      </td>
    `;

    table.appendChild(row);
  });

  // ===== PAGINATION UI =====
  renderPagination(products.length, ADMIN_PAGE_SIZE, 'admin');
}
function renderPagination(totalItems, pageSize, type) {
  const totalPages = Math.ceil(totalItems / pageSize);

  // 🔥 TÁCH RIÊNG CHO ADMIN / USER
  const containerId = type === 'admin' ? 'admin-pagination' : 'user-pagination';
  const container = document.getElementById(containerId);

  if (!container) return;

  container.innerHTML = '';

  // ===== PREV =====
  const prevBtn = document.createElement('button');
  prevBtn.className = 'btn btn-sm btn-outline-secondary mx-1';
  prevBtn.innerText = '«';
  prevBtn.disabled = currentPage === 1;

  prevBtn.onclick = () => {
    currentPage--;
    rerender(type);
  };

  container.appendChild(prevBtn);

  // ===== PAGE NUMBER =====
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');

    btn.className = 'btn btn-sm mx-1 ' +
      (i === currentPage ? 'btn-primary' : 'btn-outline-primary');

    btn.innerText = i;

    btn.onclick = () => {
      currentPage = i;
      rerender(type);
    };

    container.appendChild(btn);
  }

  // ===== NEXT =====
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-sm btn-outline-secondary mx-1';
  nextBtn.innerText = '»';
  nextBtn.disabled = currentPage === totalPages;

  nextBtn.onclick = () => {
    currentPage++;
    rerender(type);
  };

  container.appendChild(nextBtn);
}

// 🔥 TÁCH HÀM RENDER LẠI
function rerender(type) {
  if (type === 'admin') {
    renderAdminProducts(allProducts);
  } else {
    renderUserProducts(allProducts);
  }
}
function renderRecommendations(products) {
  const container = document.getElementById('recommend-container');
  container.innerHTML = '';

  products.forEach(p => {
    const col = document.createElement('div');
    col.className = 'col-md-3 mb-3';

    col.innerHTML = `
      <div class="card shadow-sm">
        <img src="/uploads/${p.image || 'no-image.png'}"
             class="card-img-top"
             style="height:150px;object-fit:cover">

        <div class="card-body">
          <h6>${p.name}</h6>
          <p class="text-danger">${p.price} VND</p>
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}
// ================= CART =================

async function loadCart() {
  const res = await apiFetch('/api/cart');

  if (!res) return;

  const data = await res.json();
  renderCart(data);
}

function renderCart(items) {
  const container = document.getElementById('cart-container');
  if (!container) return; // 🔥 QUAN TRỌNG

  container.innerHTML = '';

  if (!items || items.length === 0) {
    container.innerHTML = "<p>Giỏ hàng trống</p>";
    return;
  }

  let total = 0;

  items.forEach(item => {
    total += item.price * item.quantity;

    const div = document.createElement('div');
    div.className = 'd-flex justify-content-between align-items-center border p-2 mb-2';

    div.innerHTML = `
      <div>
        <b>${item.name}</b><br>
        ${item.price} VND
      </div>

      <div class="d-flex align-items-center gap-2">

        ${item.quantity > 1 ? `
          <button class="btn btn-sm btn-secondary"
                  onclick="decreaseQty(${item.id})">-</button>
        ` : ''}

        <span class="fw-bold">${item.quantity}</span>

        <button class="btn btn-sm btn-primary"
                onclick="increaseQty(${item.id})">+</button>

        <button class="btn btn-sm btn-danger"
                onclick="removeItem(${item.id})">X</button>
      </div>
    `;

    container.appendChild(div);
  });

  const totalDiv = document.createElement('div');
  totalDiv.className = 'mt-3 fw-bold text-end';
  totalDiv.innerHTML = `Tổng tiền: <span class="text-danger">${total} VND</span>`;
  container.appendChild(totalDiv);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn btn-danger mt-2';
  clearBtn.innerText = 'Xóa toàn bộ giỏ';
  clearBtn.onclick = clearCart;

  container.appendChild(clearBtn);
}
async function addToCart(id) {
  const res = await apiFetch('/api/cart/add', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ product_id: id })
  });

  if (!res) return;

  console.log("Đã thêm sản phẩm");

  await updateCartCount(); // 🔥 chỉ update badge
}

async function increaseQty(id) {
  const res = await apiFetch('/api/cart/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ type: 'increase' })
  });

  if (!res) return;

  loadCart();
}

async function decreaseQty(id) {
  const res = await apiFetch('/api/cart/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ type: 'decrease' })
  });

  if (!res) return;

  loadCart();
}

async function removeItem(id) {
  const res = await apiFetch('/api/cart/' + id, {
    method: 'DELETE'
  });

  if (!res) return;

  loadCart();
}

async function clearCart() {
  if (!confirm("Xóa toàn bộ giỏ hàng?")) return;

  const res = await apiFetch('/api/cart/clear', {
    method: 'DELETE'
  });

  if (!res) return;

  loadCart();
}

// ================= ADMIN ACTION =================
function addProduct() {
  if (role !== 'ADMIN') return alert("Không có quyền");

  const formData = new FormData();
  formData.append('name', document.getElementById('name').value);
  formData.append('price', document.getElementById('price').value);
  formData.append('category_id', document.getElementById('category').value);
  formData.append('image', document.getElementById('image').files[0]);

  fetch('/api/products', {
    method: 'POST',
    headers: { Authorization: token },
    body: formData
  }).then(() => loadProducts());
}

function updateProduct(id) {
  fetch('/api/products/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      Authorization: token
    },
    body: JSON.stringify({
      name: document.getElementById('name-' + id).value,
      price: document.getElementById('price-' + id).value,
      category_id: document.getElementById('cat-' + id).value
    })
  });
}
async function updateCartCount() {
  const res = await apiFetch('/api/cart');
  if (!res) return;

  const items = await res.json();

  const cartCount = document.getElementById('cart-count');

  if (cartCount) {
    const totalItems = items.reduce((sum, i) => sum + i.quantity, 0);
    cartCount.innerText = totalItems;
  }
}
function deleteProduct(id) {
  if (!confirm("Xóa sản phẩm?")) return;

  fetch('/api/products/' + id, {
    method: 'DELETE',
    headers: { Authorization: token }
  }).then(() => loadProducts());
}

function selectImage(id) {
  document.getElementById('img-' + id).click();
}

function uploadImage(id) {
  const file = document.getElementById('img-' + id).files[0];

  const formData = new FormData();
  formData.append('image', file);

  fetch('/api/products/upload/' + id, {
    method: 'PUT',
    headers: { Authorization: token },
    body: formData
  }).then(() => loadProducts());
}
async function apiFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: token
    }
  });

  if (handleAuthError(res)) return null;

  return res;
}
function toggleEdit(id) {
  const name = document.getElementById('name-' + id);
  const price = document.getElementById('price-' + id);
  const cat = document.getElementById('cat-' + id);
  const btn = document.getElementById('btn-' + id);

  const isDisabled = name.disabled;

  if (isDisabled) {
    name.disabled = false;
    price.disabled = false;
    cat.disabled = false;
    btn.innerText = 'Xác nhận';
    btn.classList.replace('btn-warning', 'btn-success');
  } else {
    updateProduct(id);
    name.disabled = true;
    price.disabled = true;
    cat.disabled = true;
    btn.innerText = 'Sửa';
    btn.classList.replace('btn-success', 'btn-warning');
  }
}
function handleSearch() {
  const keyword = document.getElementById('search-input').value.toLowerCase();
  const suggestBox = document.getElementById('search-suggest');

  // 🔥 RESET PAGE KHI SEARCH
  currentPage = 1;

  // ===== EMPTY → TRẢ LẠI GIAO DIỆN =====
  if (!keyword) {
    suggestBox.style.display = 'none';

    // ❌ Không nên gọi lại API
    // loadProducts();

    // ✅ Render lại từ data đã có
    if (role === 'ADMIN') {
      renderAdminProducts(allProducts);
    } else {
      renderUserProducts(allProducts);
    }

    return;
  }

  // ===== FILTER =====
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(keyword) ||
    (p.category_name && p.category_name.toLowerCase().includes(keyword))
  );

  // ===== RENDER PRODUCT THEO ROLE =====
  if (role === 'ADMIN') {
    renderAdminProducts(filtered);
  } else {
    renderUserProducts(filtered);
  }

  // ===== GỢI Ý =====
  suggestBox.innerHTML = '';

  const suggestions = filtered.slice(0, 5);

  suggestions.forEach(p => {
    const item = document.createElement('div');
    item.className = 'list-group-item list-group-item-action';

    item.innerText = `${p.name} (${p.category_name || ''})`;

    item.onclick = () => {
      document.getElementById('search-input').value = p.name;
      suggestBox.style.display = 'none';

      currentPage = 1; // 🔥 reset lại khi click gợi ý

      if (role === 'ADMIN') {
        renderAdminProducts([p]);
      } else {
        renderUserProducts([p]);
      }
    };

    suggestBox.appendChild(item);
  });

  suggestBox.style.display = suggestions.length ? 'block' : 'none';
}
document.getElementById('cart-icon')?.addEventListener('click', () => {
  window.location.href = 'cart.html';
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('#search-input')) {
    document.getElementById('search-suggest').style.display = 'none';
  }
});
document.addEventListener("DOMContentLoaded", () => {
  initAuthUI();
  loadCategories();
  loadProducts();

  if (rawToken && role !== 'ADMIN') {
    updateCartCount();
    loadCart();
  loadRecommendations();
    
  }
  loadTopProducts();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>PC Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center mb-4">PC Shop</h1>

  <!-- FORM THÊM SẢN PHẨM -->
  <div class="card p-3 mb-4">
    <h4>Thêm sản phẩm</h4>

    <div class="row">
      <div class="col-md-4">
        <input id="name" class="form-control" placeholder="Tên sản phẩm">
      </div>

      <div class="col-md-3">
        <input id="price" class="form-control" placeholder="Giá">
      </div>

      <div class="col-md-3">
        <select id="category" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="addProduct()">Thêm</button>
      </div>
    </div>
  </div>

  <!-- DANH SÁCH SẢN PHẨM -->
  <div id="product-container"></div>

</div>

<script>

// ================= LOAD CATEGORY =================
function loadCategories() {
  fetch('/api/categories')
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById('category');
      select.innerHTML = '';

      data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.innerText = c.name;
        select.appendChild(option);
      });
    });
}

// ================= LOAD PRODUCT =================
function loadProducts() {
  fetch('/api/products')
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById('product-container');
      container.innerHTML = '';

      // Group theo category
      const group = {};

      data.forEach(p => {
        if (!group[p.category_name]) {
          group[p.category_name] = [];
        }
        group[p.category_name].push(p);
      });

      // Render từng category
      for (let category in group) {

        const card = document.createElement('div');
        card.className = 'card mb-3';

        const cardHeader = document.createElement('div');
        cardHeader.className = 'card-header bg-dark text-white';
        cardHeader.innerText = category;

        const list = document.createElement('ul');
        list.className = 'list-group list-group-flush';

        group[category].forEach(p => {
          const item = document.createElement('li');
          item.className = 'list-group-item d-flex justify-content-between';

          item.innerHTML = `
            <span>${p.name}</span>
            <span>${p.price} VNĐ</span>
          `;

          list.appendChild(item);
        });

        card.appendChild(cardHeader);
        card.appendChild(list);
        container.appendChild(card);
      }
    });
}

// ================= ADD PRODUCT =================
function addProduct() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category_id = document.getElementById('category').value;

  fetch('/api/products', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ name, price, category_id })
  })
  .then(() => {
    loadProducts();
  });
}

// INIT
loadCategories();
loadProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>PC Shop Admin</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center mb-4">Quản lý sản phẩm PC</h1>

  <!-- FORM -->
  <div class="card shadow p-4 mb-4">
    <h4 class="mb-3">Thêm sản phẩm</h4>

    <div class="row g-2">
      <div class="col-md-4">
        <input id="name" class="form-control" placeholder="Tên sản phẩm (ví dụ: CPU Intel i7 12700K)">
      </div>

      <div class="col-md-2">
        <input id="price" class="form-control" placeholder="Giá (VD: 5000000)">
      </div>

      <div class="col-md-3">
        <select id="category" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <input type="file" id="image" class="form-control">
      </div>

      <div class="col-md-1">
        <button class="btn btn-primary w-100" onclick="addProduct()">+</button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card shadow">
    <div class="card-body">

      <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark text-center">
          <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="product-table"></tbody>
      </table>

    </div>
  </div>

</div>

<script>

let categories = [];

// ================= CATEGORY =================
function loadCategories() {
  fetch('/api/categories')
    .then(res => res.json())
    .then(data => {
      categories = data;

      const select = document.getElementById('category');
      select.innerHTML = '';

      data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.innerText = c.name;
        select.appendChild(option);
      });
    });
}

// ================= PRODUCT =================
function loadProducts() {
  fetch('/api/products')
    .then(res => res.json())
    .then(data => {

      const table = document.getElementById('product-table');
      table.innerHTML = '';

      data.forEach(p => {

        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${p.id}</td>

          <td>
            <img src="/uploads/${p.image || 'no-image.png'}"
                 width="60" height="60"
                 style="object-fit:cover; cursor:pointer"
                 onclick="selectImage(${p.id})">

            <input type="file" id="img-${p.id}" hidden onchange="uploadImage(${p.id})">
          </td>

          <td>
            <input value="${p.name}" class="form-control" id="name-${p.id}" disabled>
          </td>

          <td>
            <input value="${p.price}" class="form-control" id="price-${p.id}" disabled>
          </td>

          <td>
            <select class="form-select" id="cat-${p.id}" disabled>
              ${categories.map(c =>
                `<option value="${c.id}" ${c.id == p.category_id ? 'selected' : ''}>${c.name}</option>`
              ).join('')}
            </select>
          </td>

          <td class="text-center">
            <button class="btn btn-sm btn-warning mb-1" id="btn-${p.id}" onclick="toggleEdit(${p.id})">
              Sửa
            </button>

            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">
              Xóa
            </button>
          </td>
        `;

        table.appendChild(row);
      });
    });
}

// ================= ADD =================
function addProduct() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category_id = document.getElementById('category').value;
  const image = document.getElementById('image').files[0];

  const formData = new FormData();
  formData.append('name', name);
  formData.append('price', price);
  formData.append('category_id', category_id);
  formData.append('image', image);

  fetch('/api/products', {
    method: 'POST',
    body: formData
  }).then(() => loadProducts());
}

// ================= TOGGLE EDIT =================
function toggleEdit(id) {
  const name = document.getElementById('name-' + id);
  const price = document.getElementById('price-' + id);
  const cat = document.getElementById('cat-' + id);
  const btn = document.getElementById('btn-' + id);

  const isDisabled = name.disabled;

  if (isDisabled) {
    // bật sửa
    name.disabled = false;
    price.disabled = false;
    cat.disabled = false;

    btn.innerText = 'Xác nhận';
    btn.classList.remove('btn-warning');
    btn.classList.add('btn-success');
  } else {
    // xác nhận → update
    updateProduct(id);

    name.disabled = true;
    price.disabled = true;
    cat.disabled = true;

    btn.innerText = 'Sửa';
    btn.classList.remove('btn-success');
    btn.classList.add('btn-warning');
  }
}

// ================= UPDATE =================
function updateProduct(id) {
  const name = document.getElementById('name-' + id).value;
  const price = document.getElementById('price-' + id).value;
  const category_id = document.getElementById('cat-' + id).value;

  fetch('/api/products/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, price, category_id })
  });
}

// ================= DELETE =================
function deleteProduct(id) {
  if (!confirm("Xóa sản phẩm?")) return;

  fetch('/api/products/' + id, {
    method: 'DELETE'
  }).then(() => loadProducts());
}

// ================= IMAGE =================
function selectImage(id) {
  document.getElementById('img-' + id).click();
}

function uploadImage(id) {
  const file = document.getElementById('img-' + id).files[0];

  const formData = new FormData();
  formData.append('image', file);

  fetch('/api/products/upload/' + id, {
    method: 'PUT',
    body: formData
  }).then(() => loadProducts());
}

// INIT
loadCategories();
setTimeout(loadProducts, 300);

</script>

</body>
</html>

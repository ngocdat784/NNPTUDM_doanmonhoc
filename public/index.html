<!DOCTYPE html>
<html>
<head>
  <title>PC Shop Admin</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <!-- AUTH BAR -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <!-- LEFT: USER INFO -->
    <div id="user-info" class="fw-bold"></div>

    <!-- RIGHT: BUTTONS -->
    <div class="d-flex gap-2 align-items-center">

      <!-- login/register -->
      <div id="auth-buttons">
        <a href="login.html" class="btn btn-primary">Đăng nhập</a>
        <a href="register.html" class="btn btn-success">Đăng ký</a>
      </div>

      <button id="logout-btn" class="btn btn-danger" onclick="logout()">
  Đăng xuất
</button>

    </div>
  </div>

  <h1 class="text-center mb-4">Quản lý sản phẩm PC</h1>

  <!-- CATEGORY BUTTON -->
  <div class="text-end mb-3">
    <a id="category-btn" href="category.html" class="btn btn-dark btn-lg">
      Quản lý danh mục
    </a>
  </div>

  <!-- FORM -->
  <div class="card shadow p-4 mb-4">
    <h4 class="mb-3">Thêm sản phẩm</h4>

    <div class="row g-2">
      <div class="col-md-4">
        <input id="name" class="form-control" placeholder="Tên sản phẩm">
      </div>

      <div class="col-md-2">
        <input id="price" class="form-control" placeholder="Giá">
      </div>

      <div class="col-md-3">
        <select id="category" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <input type="file" id="image" class="form-control">
      </div>

      <div class="col-md-1">
        <button id="add-btn" class="btn btn-primary w-100" onclick="addProduct()">+</button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card shadow">
    <div class="card-body">

      <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark text-center">
          <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="product-table"></tbody>
      </table>

    </div>
  </div>

</div>

<script>

let categories = [];

const rawToken = localStorage.getItem('token');
const role = localStorage.getItem('role');
const token = rawToken ? 'Bearer ' + rawToken : null;

function initAuthUI() {
  const userInfo = document.getElementById('user-info');
  const authButtons = document.getElementById('auth-buttons');
  const logoutBtn = document.getElementById('logout-btn');
  const categoryBtn = document.getElementById('category-btn');
  const addBtn = document.getElementById('add-btn');

  // ===== CHƯA LOGIN =====
  if (!rawToken) {
    userInfo.innerText = "Chưa đăng nhập";

    authButtons.style.display = 'block';
    logoutBtn.style.display = 'none'; // CHỈ ẨN Ở ĐÂY

    if (categoryBtn) categoryBtn.style.display = 'none';
    if (addBtn) addBtn.disabled = true;

    return;
  }

  // ===== ĐÃ LOGIN =====
  try {
    const payload = JSON.parse(atob(rawToken.split('.')[1]));

    userInfo.innerText = `${payload.username} | ${role}`;

    authButtons.style.display = 'none';
    logoutBtn.style.display = 'inline-block'; // CHỈ HIỆN Ở ĐÂY

  } catch (e) {
    console.log("Token lỗi:", e);
    localStorage.clear();
    location.reload();
    return;
  }

  // ===== PHÂN QUYỀN =====
  if (role !== 'ADMIN') {
    if (categoryBtn) categoryBtn.style.display = 'none';
    if (addBtn) addBtn.disabled = true;

    disableAdminActions();
  } else {
    if (categoryBtn) categoryBtn.style.display = 'inline-block';
    if (addBtn) addBtn.disabled = false;
  }
}

// ================= ERROR =================
function handleAuthError(res) {
  if (res.status === 401 || res.status === 403) {
    alert("Hết phiên đăng nhập");
    logout();
    return true;
  }
  return false;
}

// ================= DISABLE =================
function disableAdminActions() {
 document.querySelectorAll('.btn-warning, .btn-danger').forEach(btn => {
  if (btn.id !== 'logout-btn') {
    btn.style.display = 'none';
  }
});
}

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// ================= CATEGORY =================
function loadCategories() {
  fetch('/api/categories', {
    headers: { Authorization: token }
  })
    .then(res => {
      if (handleAuthError(res)) return;
      return res.json();
    })
    .then(data => {
      if (!data) return;

      categories = data;

      const select = document.getElementById('category');
      if (!select) return;

      select.innerHTML = '';

      data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.innerText = c.name;
        select.appendChild(option);
      });
    });
}

// ================= PRODUCT =================
function loadProducts() {
  fetch('/api/products', {
    headers: { Authorization: token }
  })
    .then(res => {
      if (handleAuthError(res)) return;
      return res.json();
    })
    .then(data => {
      if (!data) return;

      const table = document.getElementById('product-table');
      table.innerHTML = '';

      data.forEach(p => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${p.id}</td>

          <td>
            <img src="/uploads/${p.image || 'no-image.png'}"
                 width="60" height="60"
                 style="object-fit:cover; cursor:pointer"
                 onclick="selectImage(${p.id})">

            <input type="file" id="img-${p.id}" hidden onchange="uploadImage(${p.id})">
          </td>

          <td>
            <input value="${p.name}" class="form-control" id="name-${p.id}" disabled>
          </td>

          <td>
            <input value="${p.price}" class="form-control" id="price-${p.id}" disabled>
          </td>

          <td>
            <select class="form-select" id="cat-${p.id}" disabled>
              ${categories.map(c =>
                `<option value="${c.id}" ${c.id == p.category_id ? 'selected' : ''}>${c.name}</option>`
              ).join('')}
            </select>
          </td>

          <td class="text-center">
            ${role === 'ADMIN' ? `
              <button class="btn btn-sm btn-warning mb-1" id="btn-${p.id}" onclick="toggleEdit(${p.id})">
                Sửa
              </button>

              <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">
                Xóa
              </button>
            ` : ''}
          </td>
        `;

        table.appendChild(row);
      });
    });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  initAuthUI();

  if (rawToken) {
    loadCategories();
    loadProducts();
  }
});

</script>

</body>
</html>

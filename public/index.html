<!DOCTYPE html>
<html>
<head>
  <title>PC Shop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center mb-4">PC Shop</h1>

  <!-- FORM -->
  <div class="card shadow p-4 mb-4">
    <h4 class="mb-3">Thêm sản phẩm</h4>

    <div class="row g-2">
      <div class="col-md-3">
        <input id="name" class="form-control" placeholder="Tên sản phẩm">
      </div>

      <div class="col-md-2">
        <input id="price" class="form-control" placeholder="Giá">
      </div>

      <div class="col-md-3">
        <select id="category" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <input type="file" id="image" class="form-control">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="addProduct()">Thêm</button>
      </div>
    </div>
  </div>

  <!-- DANH SÁCH -->
  <div id="product-container"></div>

</div>

<script>

// ================= CATEGORY =================
function loadCategories() {
  fetch('/api/categories')
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById('category');
      select.innerHTML = '';

      data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.innerText = c.name;
        select.appendChild(option);
      });
    });
}

// ================= PRODUCT =================
function loadProducts() {
  fetch('/api/products')
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById('product-container');
      container.innerHTML = '';

      const group = {};

      data.forEach(p => {
        const cat = p.category_name || "Chưa phân loại";
        if (!group[cat]) group[cat] = [];
        group[cat].push(p);
      });

      for (let category in group) {

        const card = document.createElement('div');
        card.className = 'card mb-4 shadow-sm';

        const header = document.createElement('div');
        header.className = 'card-header bg-dark text-white';
        header.innerText = category;

        const body = document.createElement('div');
        body.className = 'card-body';

        const row = document.createElement('div');
        row.className = 'row';

        group[category].forEach(p => {

          const col = document.createElement('div');
          col.className = 'col-md-4 mb-3';

          col.innerHTML = `
            <div class="card h-100">
              <img src="/uploads/${p.image || 'no-image.png'}"
                   class="card-img-top"
                   style="height:150px; object-fit:cover">

              <div class="card-body">
                <h6 class="card-title">${p.name}</h6>
                <p class="text-danger fw-bold">${p.price} VNĐ</p>
              </div>

              <div class="card-footer text-end">
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">
                  Xóa
                </button>
              </div>
            </div>
          `;

          row.appendChild(col);
        });

        body.appendChild(row);
        card.appendChild(header);
        card.appendChild(body);
        container.appendChild(card);
      }
    });
}

// ================= ADD =================
function addProduct() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category_id = document.getElementById('category').value;
  const image = document.getElementById('image').files[0];

  const formData = new FormData();
  formData.append('name', name);
  formData.append('price', price);
  formData.append('category_id', category_id);
  formData.append('image', image);

  fetch('/api/products', {
    method: 'POST',
    body: formData
  }).then(() => {
    loadProducts();
  });
}

// ================= DELETE =================
function deleteProduct(id) {
  if (!confirm("Xóa sản phẩm?")) return;

  fetch('/api/products/' + id, {
    method: 'DELETE'
  }).then(() => loadProducts());
}

// INIT
loadCategories();
loadProducts();

</script>

</body>
</html>

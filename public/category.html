<!DOCTYPE html>
<html>
<head>
  <title>Category Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center mb-4">Quản lý danh mục</h1>

  <!-- NÚT QUAY LẠI -->
  <div class="mb-3 text-end">
    <a href="index.html" class="btn btn-secondary">← Quay lại sản phẩm</a>
  </div>

  <!-- FORM -->
  <div class="card shadow p-4 mb-4">
    <h4 class="mb-3">Thêm danh mục</h4>

    <div class="row g-2">
      <div class="col-md-10">
        <input id="name" class="form-control" placeholder="Tên danh mục (VD: CPU, GPU, RAM...)">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="addCategory()">+</button>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card shadow">
    <div class="card-body">

      <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark text-center">
          <tr>
            <th>ID</th>
            <th>Tên danh mục</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="category-table"></tbody>
      </table>

    </div>
  </div>

</div>

<script>

const rawToken = localStorage.getItem('token');
const role = localStorage.getItem('role');
const token = rawToken ? `Bearer ${rawToken}` : null;

// ================= AUTH CHECK =================
function checkAdmin() {
  if (!rawToken) {
    alert("Bạn chưa đăng nhập");
    window.location.href = "login.html";
    return false;
  }

  try {
    const payload = JSON.parse(atob(rawToken.split('.')[1]));

    if (role !== 'ADMIN') {
      alert("Bạn không có quyền ADMIN");
      window.location.href = "index.html";
      return false;
    }

    return true;

  } catch (e) {
    localStorage.clear();
    window.location.href = "login.html";
    return false;
  }
}

// ================= ERROR =================
function handleAuthError(res) {
  if (res.status === 401 || res.status === 403) {
    alert("Không có quyền hoặc hết phiên");
    localStorage.clear();
    window.location.href = "login.html";
    return true;
  }
  return false;
}

// ================= LOAD =================
function loadCategories() {
  fetch('/api/categories', {
    headers: {
      Authorization: token
    }
  })
    .then(res => {
      if (handleAuthError(res)) return;
      return res.json();
    })
    .then(data => {
      if (!data) return;

      const table = document.getElementById('category-table');
      table.innerHTML = '';

      data.forEach(c => {

        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${c.id}</td>

          <td>
            <input value="${c.name}" class="form-control" id="name-${c.id}" disabled>
          </td>

          <td class="text-center">
            <button class="btn btn-sm btn-warning mb-1" id="btn-${c.id}" onclick="toggleEdit(${c.id})">
              Sửa
            </button>

            <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.id})">
              Xóa
            </button>
          </td>
        `;

        table.appendChild(row);
      });
    });
}

// ================= ADD =================
function addCategory() {
  if (role !== 'ADMIN') return alert("Không có quyền");

  const name = document.getElementById('name').value;

  fetch('/api/categories', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: token
    },
    body: JSON.stringify({ name })
  })
  .then(res => {
    if (handleAuthError(res)) return;
    if (res.ok) {
      document.getElementById('name').value = '';
      loadCategories();
    }
  });
}

// ================= TOGGLE EDIT =================
function toggleEdit(id) {
  const input = document.getElementById('name-' + id);
  const btn = document.getElementById('btn-' + id);

  const isDisabled = input.disabled;

  if (isDisabled) {
    input.disabled = false;

    btn.innerText = 'Xác nhận';
    btn.classList.replace('btn-warning', 'btn-success');
  } else {
    updateCategory(id);

    input.disabled = true;

    btn.innerText = 'Sửa';
    btn.classList.replace('btn-success', 'btn-warning');
  }
}

// ================= UPDATE =================
function updateCategory(id) {
  fetch('/api/categories/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      Authorization: token
    },
    body: JSON.stringify({
      name: document.getElementById('name-' + id).value
    })
  })
  .then(res => {
    if (handleAuthError(res)) return;
    if (res.ok) alert("Cập nhật thành công");
  });
}

// ================= DELETE =================
function deleteCategory(id) {
  if (!confirm("Xóa danh mục?")) return;

  fetch('/api/categories/' + id, {
    method: 'DELETE',
    headers: {
      Authorization: token
    }
  })
  .then(res => {
    if (handleAuthError(res)) return;
    if (res.ok) {
      alert("Đã xóa");
      loadCategories();
    }
  });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  if (!checkAdmin()) return;

  loadCategories();
});

</script>

</body>
</html>
